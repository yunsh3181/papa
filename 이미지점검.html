<!doctype html><html lang="ko"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1"><title>키오스크 전체 이미지 점검 v22</title><style>body{font-family:Arial,"Noto Sans KR",sans-serif;margin:24px;background:#f4f5f3;color:#20241f}h1{margin-bottom:4px}.sum{padding:16px;background:white;border-radius:14px;margin:16px 0;font-size:18px;font-weight:900}.filters{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}.filters button{border:1px solid #ddd;background:#fff;border-radius:999px;padding:9px 14px;font-weight:800}.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:12px}.card{background:white;border-radius:14px;padding:12px;border:2px solid #ddd}.ok{border-color:#14804a}.bad{border-color:#d71920;background:#fff6f6}.pic{height:150px;display:grid;place-items:center;background:#eee;border-radius:10px;overflow:hidden}.pic img{width:100%;height:100%;object-fit:contain}.name{font-weight:800;margin-top:8px}.file{font-size:12px;color:#666;word-break:break-all}.status{margin-top:8px;font-weight:900}.type{font-size:11px;background:#eef1ee;padding:4px 7px;border-radius:999px;display:inline-block;margin-top:6px}</style><script src="data.js"></script></head><body><h1>전체 메뉴 이미지 연결 점검 v22</h1><p>피자·사이드·음료·소스를 모두 점검합니다. 초록색은 연결 완료, 빨간색은 파일 누락입니다.</p><div id="sum" class="sum">확인 중...</div><div class="filters"><button onclick="show('ALL')">전체</button><button onclick="show('PIZZA')">피자</button><button onclick="show('SIDE')">사이드</button><button onclick="show('DRINK')">음료</button><button onclick="show('SAUCE')">소스</button><button onclick="show('BAD')">누락만</button></div><div id="grid" class="grid"></div><script>const d=window.KIOSK_DATA;const items=[...d.PIZZAS.map(x=>({...x,_type:'PIZZA'})),...d.SIDES.map(x=>({...x,_type:'SIDE'})),...d.DRINKS.map(x=>({...x,_type:'DRINK'})),...d.SAUCES.map(x=>({...x,_type:'SAUCE'}))];let done=0,checked=0;const grid=document.getElementById('grid');items.forEach(x=>{const c=document.createElement('div');c.className='card';c.dataset.type=x._type;const src='assets/images/'+encodeURIComponent(x.image||'');c.innerHTML=`<div class="pic"><img loading="lazy" src="${src}" alt=""></div><div class="type">${x._type}</div><div class="name">${x.id} · ${x.name}</div><div class="file">${x.image||'파일명 없음'}</div><div class="status">확인 중</div>`;const img=c.querySelector('img'),st=c.querySelector('.status');img.onload=()=>{c.classList.add('ok');c.dataset.status='OK';st.textContent='연결 완료';done++;checked++;update()};img.onerror=()=>{c.classList.add('bad');c.dataset.status='BAD';img.remove();c.querySelector('.pic').textContent='이미지 없음';st.textContent='파일 누락';checked++;update()};grid.appendChild(c)});function update(){document.getElementById('sum').textContent=`연결 ${done}개 / 전체 ${items.length}개 · 누락 ${checked-done}개`}function show(t){document.querySelectorAll('.card').forEach(c=>c.style.display=(t==='ALL'||c.dataset.type===t||(t==='BAD'&&c.dataset.status==='BAD'))?'block':'none')}update();</script></body></html>
