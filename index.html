/* ===== v24 Premium UI ===== */
:root{
  --g:#176b45;
  --g2:#0d5033;
  --r:#c8102e;
  --r2:#a70c25;
  --cream:#fff8ed;
  --cream2:#f8eddd;
  --surface:#fffdf8;
  --surface-strong:#fff7e8;
  --line:#eadfce;
  --ink:#26231f;
  --muted:#776f66;
  --shadow:0 14px 34px rgba(73,48,24,.11);
  --shadow-hover:0 22px 48px rgba(73,48,24,.18);
}
html{background:var(--cream)}
body{
  background:
    radial-gradient(circle at 12% 4%,rgba(200,16,46,.055),transparent 28%),
    radial-gradient(circle at 88% 16%,rgba(23,107,69,.06),transparent 26%),
    linear-gradient(180deg,#fffaf2 0%,#f8efe2 100%);
  background-attachment:fixed;
  color:var(--ink);
}
.app{overflow-x:hidden}
.head{
  height:88px;
  background:linear-gradient(115deg,var(--g2),var(--g) 55%,#1c7650);
  box-shadow:0 7px 22px rgba(12,65,41,.24);
  border-bottom:1px solid rgba(255,255,255,.14);
}
.brandLogo{
  background:rgba(255,255,255,.96);
  border-radius:14px;
  padding:5px;
  box-shadow:0 6px 18px rgba(0,0,0,.18);
}
.progress{
  background:rgba(255,253,248,.94);
  backdrop-filter:blur(16px);
  padding:12px 20px;
  box-shadow:0 8px 24px rgba(85,60,35,.06);
}
.progress span{
  background:#eee5d7;
  color:#6d6257;
  border:1px solid transparent;
  transition:transform .22s ease,background .22s ease,box-shadow .22s ease;
}
.progress .on{
  background:linear-gradient(135deg,var(--r),#e4314c);
  box-shadow:0 6px 16px rgba(200,16,46,.23);
  transform:translateY(-1px);
}
.progress .done{background:linear-gradient(135deg,var(--g2),var(--g))}
.stage{padding:32px 28px 110px}
.title{
  font-size:38px;
  letter-spacing:-1.2px;
  color:#28231e;
  text-shadow:0 1px 0 #fff;
}
.sub{color:var(--muted);font-size:15px}
.grid{gap:20px}
.card{
  overflow:hidden;
  background:
    linear-gradient(155deg,rgba(255,255,255,.95),rgba(255,247,232,.96));
  border:1px solid rgba(226,209,187,.9);
  border-radius:24px;
  padding:20px;
  box-shadow:var(--shadow);
  transform:translateY(0) scale(1);
  transition:
    transform .18s cubic-bezier(.2,.8,.2,1),
    box-shadow .18s ease,
    border-color .18s ease,
    background .18s ease;
  animation:cardIn .38s both;
}
.grid .card:nth-child(2){animation-delay:.035s}
.grid .card:nth-child(3){animation-delay:.07s}
.grid .card:nth-child(4){animation-delay:.105s}
.grid .card:nth-child(5){animation-delay:.14s}
.grid .card:nth-child(6){animation-delay:.175s}
.grid .card:nth-child(n+7){animation-delay:.21s}
.card::after{
  content:"";
  position:absolute;
  inset:auto -35% -70% auto;
  width:150px;height:150px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(200,16,46,.08),transparent 68%);
  pointer-events:none;
}
.card:hover{
  transform:translateY(-6px) scale(1.012);
  box-shadow:var(--shadow-hover);
  border-color:rgba(200,16,46,.45);
}
.card:active{
  transform:translateY(-1px) scale(.985);
  transition-duration:.08s;
}
.card.active{
  border:2px solid var(--r);
  background:linear-gradient(155deg,#fff,#fff2ed);
  box-shadow:0 0 0 4px rgba(200,16,46,.10),var(--shadow-hover);
}
.card h2,.card h3{letter-spacing:-.45px}
.badge{
  right:12px;top:12px;
  background:linear-gradient(135deg,var(--r),#e62f4b);
  box-shadow:0 7px 16px rgba(200,16,46,.22);
}
.pic{
  height:164px;
  border-radius:19px;
  background-color:#f8efe2;
  box-shadow:inset 0 0 0 1px rgba(225,207,183,.72);
  transition:transform .25s cubic-bezier(.2,.8,.2,1);
}
.card:hover .pic{transform:scale(1.035)}
.imagePic img{transition:transform .4s cubic-bezier(.2,.8,.2,1)}
.card:hover .imagePic img{transform:scale(1.055)}
.crustCard{min-height:430px}
.crustPic{
  height:230px;
  background:linear-gradient(160deg,#fff,#f7ecdc);
  border:1px solid #eadcc8;
  box-shadow:inset 0 1px 0 #fff;
}
.crustPic img{transition:transform .35s ease}
.crustCard:hover .crustPic img{transform:scale(1.06) rotate(-.4deg)}
.price{
  color:var(--r);
  font-size:23px;
  letter-spacing:-.6px;
}
.muted{color:var(--muted);line-height:1.45}
.tabs button{
  border:1px solid #ded0bd;
  background:rgba(255,253,248,.9);
  box-shadow:0 5px 13px rgba(80,56,33,.05);
  transition:.16s ease;
}
.tabs button:hover{transform:translateY(-2px);border-color:var(--r)}
.tabs .active{
  background:linear-gradient(135deg,var(--g2),var(--g));
  box-shadow:0 8px 18px rgba(23,107,69,.22);
}
.summary{
  background:linear-gradient(145deg,#fffdf8,#fff7ea);
  border:1px solid #eadcc8;
  box-shadow:var(--shadow);
  animation:panelIn .35s ease both;
}
.row{border-bottom-color:#e4d7c5}
.cartbar{
  height:80px;
  background:rgba(27,34,29,.95);
  backdrop-filter:blur(18px);
  box-shadow:0 -10px 34px rgba(37,25,15,.22);
  border-top:1px solid rgba(255,255,255,.08);
}
.cartprice{color:#ffe7b4;font-size:22px}
.cartbar button{
  min-height:48px;
  border-radius:14px;
  transition:transform .14s ease,box-shadow .14s ease,filter .14s ease;
}
.cartbar button:active{transform:scale(.94)}
.prev{background:#f1e8dc;color:#352f29}
.next{
  background:linear-gradient(135deg,var(--r2),var(--r),#df2a46);
  box-shadow:0 8px 20px rgba(200,16,46,.27);
}
.next:hover{filter:brightness(1.06);box-shadow:0 11px 25px rgba(200,16,46,.34)}
.hero{
  background:
    radial-gradient(circle at 20% 18%,rgba(255,255,255,.12),transparent 29%),
    radial-gradient(circle at 85% 75%,rgba(200,16,46,.22),transparent 30%),
    linear-gradient(135deg,#0d5033,#176b45 55%,#113c29);
}
.heroBox{
  position:relative;
  overflow:hidden;
  background:linear-gradient(150deg,rgba(255,255,255,.98),rgba(255,247,232,.98));
  border:1px solid rgba(255,255,255,.7);
  box-shadow:0 28px 65px rgba(0,0,0,.24);
  animation:heroIn .65s cubic-bezier(.2,.8,.2,1) both;
}
.heroBox::before{
  content:"";
  position:absolute;
  width:360px;height:360px;
  border-radius:50%;
  right:-190px;top:-210px;
  background:radial-gradient(circle,rgba(200,16,46,.13),transparent 66%);
}
.heroLogo{filter:drop-shadow(0 8px 13px rgba(200,16,46,.12))}
.hero h1{letter-spacing:-2px;line-height:1.16}
.start{
  background:linear-gradient(135deg,var(--r2),var(--r),#e3304d);
  box-shadow:0 12px 30px rgba(200,16,46,.28);
  transition:transform .17s ease,box-shadow .17s ease,filter .17s ease;
  position:relative;
  overflow:hidden;
}
.start:hover{transform:translateY(-3px) scale(1.015);box-shadow:0 17px 35px rgba(200,16,46,.34)}
.start:active{transform:scale(.97)}
.modal{
  background:linear-gradient(145deg,#fffdf9,#fff5e7);
  border:1px solid rgba(255,255,255,.75);
  box-shadow:0 30px 70px rgba(0,0,0,.3);
  animation:modalIn .24s cubic-bezier(.2,.8,.2,1) both;
}
.backdrop{animation:fadeIn .18s ease both}
.keypad button,.qty button{
  box-shadow:0 5px 12px rgba(80,54,29,.07);
  transition:transform .12s ease,background .12s ease;
}
.keypad button:active,.qty button:active{transform:scale(.92);background:#f5e5d5}
.phoneDisplay{background:#fffaf2;border-color:#dccdb8}
.done{animation:panelIn .4s ease both}
.stage>*{animation:pageIn .3s cubic-bezier(.2,.8,.2,1) both}

/* 터치 리플 */
.ripple{
  position:fixed;
  border-radius:50%;
  transform:translate(-50%,-50%) scale(0);
  background:rgba(255,255,255,.56);
  pointer-events:none;
  z-index:9999;
  animation:ripple .5s ease-out forwards;
}

@keyframes pageIn{
  from{opacity:0;transform:translateY(10px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes cardIn{
  from{opacity:0;transform:translateY(18px) scale(.985)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes panelIn{
  from{opacity:0;transform:translateY(16px)}
  to{opacity:1;transform:translateY(0)}
}
@keyframes heroIn{
  from{opacity:0;transform:translateY(26px) scale(.97)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes modalIn{
  from{opacity:0;transform:translateY(18px) scale(.965)}
  to{opacity:1;transform:translateY(0) scale(1)}
}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes ripple{
  to{transform:translate(-50%,-50%) scale(7);opacity:0}
}
@media (prefers-reduced-motion:reduce){
  *,*::before,*::after{animation-duration:.01ms!important;transition-duration:.01ms!important}
}
@media(max-width:560px){
  .stage{padding:20px 14px 100px}
  .card{border-radius:20px;padding:16px}
  .pic{height:150px}
  .cartbar{height:74px}
}


/* v25 도우 이미지 최적화 */
.crustPic{background:linear-gradient(160deg,#fffdf9,#f9efe2)}
.crustPic img{object-fit:contain;max-width:100%;max-height:100%;padding:6px}

</style><script src="data.js"></script></head><body><div id="main" class="app"></div><div id="cart"></div><div id="modal"></div><script>
const money=n=>new Intl.NumberFormat('ko-KR').format(Math.round(n))+'원';
const {PIZZAS,CRUSTS,TOPPINGS,SIDES,DRINKS,SAUCES,SETTINGS}=window.KIOSK_DATA;

function escAttr(s){return String(s||'').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;')}
function itemPic(item,emoji='🍕'){if(!item||!item.image)return `<div class="pic">${emoji}</div>`;const src='assets/images/'+encodeURIComponent(item.image).replace(/%2F/g,'/');return `<div class="pic imagePic"><img src="${src}" alt="${escAttr(item.name)}" onerror="this.parentElement.classList.remove('imagePic');this.parentElement.innerHTML='${emoji}'"></div>`}
const flow=['type','timing','promo','size','mode','pizza','crust','topping','side','drink','review','phone'];
const state={step:'home',orderType:null,orderTiming:null,reserveTime:null,reserveHour:null,reserveMinute:null,promo:null,set:null,size:null,mode:'single',left:null,right:null,crust:null,toppingChoice:null,toppings:{},extraSides:{},extraDrinks:{},setSides:{},setDrink:null,cat:'ALL',modal:null,disposables:null,phone:'',orderNo:null};
function po(id){return PIZZAS.find(x=>x.id===id)};function sum(o){return Object.values(o).reduce((a,b)=>a+b,0)};
function reset(){Object.assign(state,{step:'home',orderType:null,orderTiming:null,reserveTime:null,reserveHour:null,reserveMinute:null,promo:null,set:null,size:null,mode:'single',left:null,right:null,crust:null,toppingChoice:null,toppings:{},extraSides:{},extraDrinks:{},setSides:{},setDrink:null,cat:'ALL',modal:null,disposables:null,phone:'',orderNo:null})}
function progress(){if(state.step==='home'||state.step==='done')return '';let i=Math.max(0,flow.indexOf(state.step));return `<div class="progress">${flow.map((x,n)=>`<span class="${n<i?'done':n===i?'on':''}">${['방식','시간','혜택','사이즈','구성','피자','크러스트','토핑','사이드','음료','확인','전화번호'][n]}</span>`).join('')}</div>`}
function shell(c){return `<div class="head"><div class="brand"><img class="brandLogo" src="assets/images/papajohns_red_logo.png" alt="Papa Johns"><b class="brandName">${SETTINGS.STORE_NAME}</b></div></div>${progress()}<div class="stage">${c}</div>`}

 const main=document.getElementById('main');
 main.classList.remove('pageSwap');
 void main.offsetWidth;
 main.innerHTML=view();
 main.classList.add('pageSwap');
 document.getElementById('cart').innerHTML=bar();
 document.getElementById('modal').innerHTML=modalView();
}
function view(){
 if(state.step==='home')return `<section class="hero"><div class="heroBox"><img class="heroLogo" src="assets/images/papajohns_red_logo.png" alt="Papa Johns"><h1>갓 구운 피자를<br>지금 주문하세요</h1><button class="start" onclick="state.step='type';render()">주문하기</button></div></section>`;

 if(state.step==='topping'){if(!state.toppingChoice)return shell(`<h1 class="title">토핑을 추가하시겠어요?</h1><div class="grid two"><button class="card" onclick="state.toppingChoice='add';render()"><h2>토핑 추가하기</h2><p>같은 종류 최대 2개, 총 5개까지</p></button><button class="card" onclick="state.toppingChoice='skip';state.toppings={};state.step='side';render()"><h2>건너뛰기</h2><p>토핑 없이 다음 단계로 이동</p></button></div>`);return shell(`<h1 class="title">토핑 선택</h1><div class="notice">같은 종류 최대 2개, 총 5개까지 선택 가능합니다. 현재 ${sum(state.toppings)}/5개</div><div class="grid">${TOPPINGS.map(t=>{let q=state.toppings[t.id]||0;return `<div class="card ${q?'active':''}" onclick="toppingQty('${t.id}',1)">${q?`<span class="badge">${q}개 선택</span>`:''}<h3>${t.name}</h3><div class="price">+${money(t.price[state.size])}</div><div class="qty"><button onclick="event.stopPropagation();toppingQty('${t.id}',-1)">−</button><b>${q}</b><button onclick="event.stopPropagation();toppingQty('${t.id}',1)">＋</button></div></div>`}).join('')}</div>`)};
 if(state.step==='side'){if(state.set){const need=state.set===4?2:1;return shell(`<h1 class="title">세트 포함 사이드 선택</h1><div class="notice">${need}개 선택 · 같은 메뉴 중복 가능 (${sum(state.setSides)}/${need})</div><div class="grid">${SIDES.filter(x=>state.set===2?x.set2:x.set).map(x=>setSideCard(x,need)).join('')}</div><h2 style="margin-top:28px">추가 사이드 선택</h2><div class="grid">${SIDES.map(x=>qcard(x,'extraSides')).join('')}</div>`)}return shell(`<h1 class="title">사이드 선택</h1><div class="grid">${SIDES.map(x=>qcard(x,'extraSides')).join('')}</div>`)};

function pickPromo(p){state.promo=p;if(p==='set'){state.step='setChoice'}else if(p==='happy'){state.size='R';state.crust='오리지널';state.step='pizza'}else if(p==='upup'){state.size='F';state.step='mode'}else state.step='size';render()}
function chooseSet(n){state.set=n;state.size=n===2?'R':n===3?'L':'F';state.mode='single';state.step='pizza';render()}
function halfAllowed(first,second){if(first===second)return false;const special=['P002','P009'];if(special.includes(first))return special.includes(second);if(special.includes(second))return false;return true}
function pickPizza(id){if(state.mode==='single'){state.left=id;afterPizza()}else if(!state.left){state.left=id;state.cat='ALL';render()}else{state.right=id;state.modal='halfConfirm';render()}}
function afterPizza(){const selected=po(state.left);if(selected?.cat==='THIN'){state.crust='씬';state.step='topping'}else if(state.size==='R'){state.crust='오리지널';state.step='topping'}else state.step='crust';render()}
function confirmHalf(){state.modal=null;afterPizza()}function redoHalf(){state.right=null;state.modal=null;render()}function selectCrust(name){state.crust=name;if(state.promo==='upup'&&name==='크루아상'){state.modal='croissantNotice';render();return}state.step='topping';render()}function confirmCroissant(){state.modal=null;state.step='topping';render()}function effectiveSize(){return state.promo==='upup'&&state.crust==='크루아상'?'L':state.size}function eventLabel(){return state.set?state.set+'인 세트':({happy:'해피아워',takeout:'포장 20% 할인',upup:'UP&UP',normal:'일반 주문'})[state.promo]||'혜택 미선택'}function needsDisposables(){if(state.orderType!=='takeout')return false;const extra=Object.entries(state.extraSides).some(([id,q])=>q>0&&SIDES.find(x=>x.id===id)?.disposable);const included=Object.entries(state.setSides||{}).some(([id,q])=>q>0&&SIDES.find(x=>x.id===id)?.disposable);return extra||included}function chooseDisposables(v){state.disposables=v;state.modal=null;state.step='drink';render()}
function qcard(x,key){let q=state[key][x.id]||0;return `<div class="card ${q?'active':''}" onclick="qty('${key}','${x.id}',1,9,99)">${q?`<span class="badge">${q}개</span>`:''}${itemPic(x,'🍽️')}<h3>${x.name}</h3><div class="price">${money(x.price)}</div><div class="qty"><button onclick="event.stopPropagation();qty('${key}','${x.id}',-1,9,99)">−</button><b>${q}</b><button onclick="event.stopPropagation();qty('${key}','${x.id}',1,9,99)">＋</button></div></div>`}
function setSideCard(x,need){let q=state.setSides[x.id]||0;return `<div class="card ${q?'active':''}" onclick="qty('setSides','${x.id}',1,2,${need})">${q?`<span class="badge">${q}개</span>`:''}${itemPic(x,'🍽️')}<h3>${x.name}</h3><div class="price">세트 포함</div><div class="qty"><button onclick="event.stopPropagation();qty('setSides','${x.id}',-1,2,${need})">−</button><b>${q}</b><button ${sum(state.setSides)>=need?'disabled':''} onclick="event.stopPropagation();qty('setSides','${x.id}',1,2,${need})">＋</button></div></div>`}
function drinkGroups(){return [
 {name:'코카-콜라',small:'D001',large:'D002'},
 {name:'코카-콜라 제로',small:'D003',large:'D004'},
 {name:'스프라이트',small:'D005',large:'D006'},
 {name:'스프라이트 제로',small:'D007',large:'D008'}
]}
function drinkGroupCard(g){let a=DRINKS.find(x=>x.id===g.small),b=DRINKS.find(x=>x.id===g.large),qa=state.extraDrinks[a.id]||0,qb=state.extraDrinks[b.id]||0,total=qa+qb;return `<div class="card ${total?'active':''}" onclick="qty('extraDrinks','${a.id}',1,9,99)">${total?`<span class="badge">${total}개</span>`:''}${itemPic(a,'🥤')}<h3>${g.name}</h3><div class="muted">카드 터치 시 500ml 수량 증가</div><div class="row"><span>${a.name.replace(g.name,'').trim()} · ${money(a.price)}</span><span class="qty"><button onclick="event.stopPropagation();qty('extraDrinks','${a.id}',-1,9,99)">−</button><b>${qa}</b><button onclick="event.stopPropagation();qty('extraDrinks','${a.id}',1,9,99)">＋</button></span></div><div class="row"><span>${b.name.replace(g.name,'').trim()} · ${money(b.price)}</span><span class="qty"><button onclick="event.stopPropagation();qty('extraDrinks','${b.id}',-1,9,99)">−</button><b>${qb}</b><button onclick="event.stopPropagation();qty('extraDrinks','${b.id}',1,9,99)">＋</button></span></div></div>`}
function setDrinkCard(x){return `<button class="card ${state.setDrink===x.id?'active':''}" onclick="state.setDrink='${x.id}';render()">${state.setDrink===x.id?'<span class="badge">선택됨</span>':''}${itemPic(x,'🥤')}<h3>${x.name}</h3><div class="price">세트 포함</div></button>`}

function qty(key,id,d,maxEach,maxTotal){let o=state[key],n=Math.max(0,Math.min(maxEach,(o[id]||0)+d));if(d>0&&sum(o)>=maxTotal)return;if(n)o[id]=n;else delete o[id];render()}function toppingQty(id,d){let q=state.toppings[id]||0,total=sum(state.toppings);if(d>0&&q>=2){state.modal='toppingLimitEach';render();return}if(d>0&&total>=5){state.modal='toppingLimitTotal';render();return}let n=Math.max(0,q+d);if(n)state.toppings[id]=n;else delete state.toppings[id];render()}
function pizzaBase(){let a=po(state.left)?.[state.promo==='upup'?'L':state.size]||0;if(state.mode==='half'){let b=po(state.right)?.[state.promo==='upup'?'L':state.size]||0;return (a+b)/2}return a}
function crustFee(){if(state.promo==='upup')return 0;return CRUSTS.find(c=>c.name===(state.crust||'오리지널'))?.[state.size]||0}
function topFee(){return Object.entries(state.toppings).reduce((s,[id,q])=>s+(TOPPINGS.find(x=>x.id===id)?.price[effectiveSize()]||0)*q,0)}function sideFee(){return Object.entries(state.extraSides).reduce((s,[id,q])=>s+(SIDES.find(x=>x.id===id)?.price||0)*q,0)}function drinkFee(){return Object.entries(state.extraDrinks).reduce((s,[id,q])=>s+(DRINKS.find(x=>x.id===id)?.price||0)*q,0)}
function price(){let pizza=pizzaBase(),half=state.mode==='half'?SETTINGS.HALF_EXTRA:0,crust=crustFee(),tops=topFee(),side=sideFee(),drink=drinkFee(),discount=0,label='';let product=pizza+half+crust+tops;if(state.set){product=(state.set===2?24000:state.set===3?33000:42000)+half+crust+tops;label='세트 메뉴'}else if(state.promo==='happy'){let normal=po(state.left).R+tops;discount=Math.max(0,normal-(SETTINGS.HAPPY_PRICE+tops));product=SETTINGS.HAPPY_PRICE+tops;label='해피아워 할인'}else if(state.promo==='takeout'&&['L','F'].includes(state.size)){discount=Math.round(product*(SETTINGS.PACK_DISCOUNT/100));product-=discount;label=`포장 할인 ${SETTINGS.PACK_DISCOUNT}%`}else if(state.promo==='upup'){let normalSize=effectiveSize(),normalPizza=state.mode==='half'?((po(state.left)[normalSize]+po(state.right)[normalSize])/2):po(state.left)[normalSize],normalCrust=state.crust==='크루아상'?6000:(CRUSTS.find(c=>c.name===state.crust)?.[normalSize]||0),normal=normalPizza+half+normalCrust+tops;let pay=pizza+half+tops;discount=Math.max(0,normal-pay);product=pay;label='UP&UP 할인'}return{pizza,half,crust,tops,side,drink,discount,label,total:product+side+drink}}
function summary(){let p=price(),rows=[['이용방법',state.orderType==='takeout'?'포장':'먹고가기'],['주문시간',state.orderTiming==='reserve'?`예약 ${state.reserveTime}`:'바로 주문'],['선택 혜택',eventLabel()],['피자',state.mode==='half'?`${po(state.left).name} / ${po(state.right).name}`:po(state.left).name],['사이즈',effectiveSize()+(state.promo==='upup'&&state.crust==='크루아상'?' (크루아상은 라지 제공)':'')],['크러스트',state.crust||'오리지널']];let html=rows.map(x=>`<div class="row"><b>${x[0]}</b><span>${x[1]}</span></div>`).join('');if(state.disposables!==null)html+=`<div class="row"><b>일회용품</b><span>${state.disposables?'필요':'필요 없음'}</span></div>`;[['하프앤하프 추가금',p.half],['토핑 추가금',p.tops],['크러스트 추가금',p.crust],['사이드 추가금',p.side],['음료 추가금',p.drink]].forEach(x=>{if(x[1])html+=`<div class="row"><b>${x[0]}</b><span>+${money(x[1])}</span></div>`});if(p.discount)html+=`<div class="row discount"><b>${p.label}</b><span>−${money(p.discount)}</span></div>`;return html}
function canNext(){if(state.step==='topping'||state.step==='review')return true;if(state.step==='side')return state.set?sum(state.setSides)===(state.set===4?2:1):true;if(state.step==='drink')return state.set?!!state.setDrink:true;return false}
function nextStep(){if(state.step==='topping')state.step='side';else if(state.step==='side'){if(needsDisposables()&&state.disposables===null){state.modal='disposables';render();return}else state.step='drink';}else if(state.step==='drink')state.step='review';else if(state.step==='review')state.step='phone';render()}
function prevStep(){const m={timing:'type',reserve:'timing',promo:state.orderType==='takeout'?'timing':'type',setChoice:'promo',size:'promo',mode:'size',pizza:state.set?'setChoice':'mode',crust:'pizza',topping:(state.size==='R'||po(state.left)?.cat==='THIN')?'pizza':'crust',side:'topping',drink:'side',review:'drink',phone:'review'};state.step=m[state.step]||'home';render()}
function bar(){if(['home','done'].includes(state.step))return '';let cur=state.left?(state.mode==='half'&&state.right?po(state.left).name+' / '+po(state.right).name:po(state.left).name):'아직 피자를 선택하지 않았습니다';let timing=state.orderType==='takeout'?(state.orderTiming==='reserve'?'포장 예약 '+(state.reserveTime||'시간 미선택'):'포장 바로주문'):'먹고가기';let opts=[eventLabel(),timing,state.left?effectiveSize():'',state.crust||'',sum(state.toppings)?'토핑 '+sum(state.toppings)+'개':'',sum(state.extraSides)?'사이드 '+sum(state.extraSides)+'개':'',sum(state.extraDrinks)?'음료 '+sum(state.extraDrinks)+'개':''].filter(Boolean).join(' · ');return `<div class="cartbar"><div class="cartmain"><div class="carttitle">${cur}</div><div class="cartdetail">${opts}</div></div><span class="cartprice">${state.left?money(price().total):''}</span><button class="prev" onclick="reset();render()">처음으로</button>${state.step!=='type'?'<button class="prev" onclick="prevStep()">이전</button>':''}${canNext()?`<button class="next" onclick="nextStep()">다음</button>`:''}</div>`}
function modalView(){if(!state.modal)return '';if(state.modal==='halfConfirm')return `<div class="backdrop"><div class="modal"><h2>하프앤하프 선택 확인</h2><div class="halfPreview"><div class="preview">${itemPic(po(state.left))}<b>${po(state.left).name}</b></div><div class="preview">${itemPic(po(state.right))}<b>${po(state.right).name}</b></div></div><div class="notice">선택하신 두 가지 피자로 하프앤하프를 구성합니다.</div><div class="modalBtns"><button class="prev" onclick="redoHalf()">다시 고르기</button><button class="next" onclick="confirmHalf()">계속하기</button></div></div></div>`;if(state.modal==='croissantNotice')return `<div class="backdrop"><div class="modal"><h2>크루아상 크러스트 안내</h2><div class="notice">UP&UP에서 크루아상 선택 시 해당 피자는 <b>라지 사이즈</b>로 제공됩니다.</div><div class="modalBtns" style="grid-template-columns:1fr"><button class="next" onclick="confirmCroissant()">확인하고 계속하기</button></div></div></div>`;if(state.modal==='disposables')return `<div class="backdrop"><div class="modal"><h2>일회용품이 필요하신가요?</h2><div class="notice">포크·스푼 등 일회용품 제공 여부를 선택해 주세요.</div><div class="modalBtns"><button class="prev" onclick="chooseDisposables(false)">필요하지 않아요</button><button class="next" onclick="chooseDisposables(true)">필요해요</button></div></div></div>`;if(state.modal==='toppingLimitEach')return `<div class="backdrop"><div class="modal"><h2>추가 토핑 안내</h2><div class="notice">같은 종류의 토핑은 최대 <b>2개</b>까지 추가할 수 있습니다.</div><div class="modalBtns" style="grid-template-columns:1fr"><button class="next" onclick="state.modal=null;render()">확인</button></div></div></div>`;if(state.modal==='toppingLimitTotal')return `<div class="backdrop"><div class="modal"><h2>추가 토핑 안내</h2><div class="notice">추가 토핑은 피자 한 판당 총 <b>5개</b>까지 선택할 수 있습니다.<br>토핑 한 종류당 최대 2개까지 가능합니다.</div><div class="modalBtns" style="grid-template-columns:1fr"><button class="next" onclick="state.modal=null;render()">확인</button></div></div></div>`;return ''}
function reserveLimit(){let d=new Date();d.setHours(21,20,0,0);return d}function reserveStart(){let d=new Date(Date.now()+30*60000);d.setMinutes(Math.ceil(d.getMinutes()/10)*10,0,0);return d}function hasReserveSlots(){return reserveStart()<=reserveLimit()}function reserveWheelData(){let start=reserveStart(),limit=reserveLimit(),hours=[];if(start<=limit){for(let h=start.getHours();h<=21;h++){let hh=String(h).padStart(2,'0');if(validMinutesForHour(hh,start).length)hours.push(hh)}}if(!state.reserveHour||!hours.includes(state.reserveHour))state.reserveHour=hours[0]||null;if(state.reserveHour){let valid=validMinutesForHour(state.reserveHour,start);if(!valid.includes(state.reserveMinute))state.reserveMinute=valid[0]||null}return{hours,minutes:state.reserveHour?validMinutesForHour(state.reserveHour,start):[]}}function validMinutesForHour(h,start){let limit=reserveLimit();return ['00','10','20','30','40','50'].filter(m=>{let d=new Date();d.setHours(Number(h),Number(m),0,0);return d>=start&&d<=limit})}function setReserveHour(h){state.reserveHour=h;let mins=validMinutesForHour(h,reserveStart());if(!mins.includes(state.reserveMinute))state.reserveMinute=mins[0]||null;render()}function setReserveMinute(m){state.reserveMinute=m;render()}function validReserveSelection(){if(!state.reserveHour||!state.reserveMinute)return false;let d=new Date();d.setHours(Number(state.reserveHour),Number(state.reserveMinute),0,0);return d>=new Date(Date.now()+30*60000)&&d<=reserveLimit()&&d.getDate()===new Date().getDate()}function confirmReserve(){if(!validReserveSelection())return;state.reserveTime=state.reserveHour+':'+state.reserveMinute;state.step='promo';render()}function pressPhone(n){if(state.phone.length<8){state.phone+=n;render()}}function backPhone(){state.phone=state.phone.slice(0,-1);render()}function clearPhone(){state.phone='';render()}function formatPhone(v){let x=v.replace(/\D/g,'').slice(0,8);return '010-'+(x.slice(0,4).padEnd(4,'•'))+'-'+(x.slice(4,8).padEnd(4,'•'))}function validPhone(){return /^\d{8}$/.test(state.phone)}function last4(){return state.phone.slice(-4)}function complete(){if(!validPhone())return;state.orderNo=last4();state.step='done';render();setTimeout(()=>{reset();render()},5000)}
render();

document.addEventListener('pointerdown',e=>{
 const target=e.target.closest('button');
 if(!target||target.disabled)return;
 const r=document.createElement('span');
 r.className='ripple';
 const size=Math.max(target.offsetWidth,target.offsetHeight)*.28;
 r.style.width=r.style.height=size+'px';
 r.style.left=e.clientX+'px';
 r.style.top=e.clientY+'px';
 document.body.appendChild(r);
 setTimeout(()=>r.remove(),520);
},{passive:true});

</script></body></html>
